<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WDD 231 | Weather API Test</title>
  <meta name="description" content="OpenWeatherMap API Test page for WDD 231 Web Frontend Development I course.">
  <meta name="author" content="Jean Andrade">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/larger.css" media="screen and (min-width: 600px)">
  
  <script src="scripts/weather.js" defer></script>
</head>
<body>
  <header>
    <img src="images/byui-logo.svg" alt="BYU-I logo">
    <span>Jean Andrade</span>
  </header>
  
  <main>
    <div class="weather-card">
      <h2>OpenWeatherMap.org API Test</h2>
      <div class="location">Aguas Calientes, Ureña, Táchira, Venezuela</div>
      
      <div class="weather-info">
        <div class="temp-container">
          <span id="current-temp">--&deg;C</span>
        </div>
        
        <figure>
          <div class="icon-backdrop">
            <img id="weather-icon" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'></svg>" alt="Weather icon placeholder">
          </div>
          <figcaption>Loading weather data...</figcaption>
        </figure>
      </div>
    </div>
  </main>
  
  <footer>
    <p>Jean Andrade | OpenWeatherMap.org | CC BY-SA 4.0</p>
  </footer>
</body>
</html>
